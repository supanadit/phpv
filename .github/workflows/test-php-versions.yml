name: Test PHP Versions

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  test-php-versions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "4.4"
          - "5.0"
          - "5.1"
          - "5.2"
          - "5.3"
          - "5.4"
          - "5.5"
          - "5.6"
          - "7.1"
          - "7.2"
          - "7.3"
          - "7.4"
          - "8.0"
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"
          - "8.5"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Cache phpv downloads
        uses: actions/cache@v4
        with:
          path: ~/.phpv/cache
          key: phpv-cache-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            phpv-cache-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libcurl4-openssl-dev \
            libxml2-dev \
            libonig-dev \
            libzip-dev \
            libsqlite3-dev \
            pkg-config \
            cmake \
            perl \
            m4 \
            autoconf \
            automake \
            libtool \
            re2c \
            bison \
            git \
            wget \
            curl \
            xz-utils \
            libgdbm-dev \
            libdb-dev \
            libreadline-dev \
            libncurses-dev \
            perl

      - name: Build phpv binary
        run: |
          go build -ldflags "-X github.com/supanadit/phpv/domain.AppVersion=ci-test" -o phpv ./app/phpv.go
          chmod +x phpv
          sudo mv phpv /usr/local/bin/

      - name: Initialize phpv
        run: |
          eval "$(phpv init bash)"
          echo "PHPV_ROOT=$PHPV_ROOT"
          echo "PATH=$PATH"
          # Persist for subsequent steps
          echo "PHPV_ROOT=$PHPV_ROOT" >> $GITHUB_ENV
          echo "$PHPV_ROOT/bin" >> $GITHUB_PATH

      - name: Install PHP ${{ matrix.php-version }}
        timeout-minutes: 60
        run: |
          echo "Installing PHP ${{ matrix.php-version }}..."
          phpv install ${{ matrix.php-version }} -v
        env:
          PHPV_ROOT: ${{ env.PHPV_ROOT }}

      - name: Use PHP ${{ matrix.php-version }} and Generate Shims
        run: |
          echo "Activating PHP ${{ matrix.php-version }} and generating shims..."
          eval "$(phpv use ${{ matrix.php-version }})"
          echo "PHPV_VERSION=$PHPV_VERSION"
          echo "PHPV_ROOT=$PHPV_ROOT"
          echo "$PHPV_ROOT/bin" >> $GITHUB_PATH
        env:
          PHPV_ROOT: ${{ env.PHPV_ROOT }}

      - name: Test Shims
        run: |
          echo "Testing shims..."
          ls -la $PHPV_ROOT/bin/
          
          for binary in php php-cgi php-config phpize phpdbg; do
            if [ -f "$PHPV_ROOT/bin/$binary" ]; then
              echo "✓ $binary shim exists"
            else
              echo "✗ $binary shim not found"
              exit 1
            fi
          done
          
          echo "All shims verified successfully!"

      - name: Run php -v
        run: |
          echo "Running php -v..."
          
          PHP_OUTPUT=$(php -v 2>&1)
          echo "$PHP_OUTPUT"
          
          EXPECTED_PATTERN="PHP ${{ matrix.php-version }}"
          if echo "$PHP_OUTPUT" | grep -q "$EXPECTED_PATTERN"; then
            echo "✓ php -v output contains expected version: $EXPECTED_PATTERN"
          else
            echo "✗ php -v output does not contain expected version: $EXPECTED_PATTERN"
            echo "Full output:"
            echo "$PHP_OUTPUT"
            exit 1
          fi
          
          echo "PHP ${{ matrix.php-version }} test completed successfully!"

      - name: Test additional PHP binaries
        run: |
          echo "Testing additional PHP binaries..."
          
          echo "Testing php-config..."
          php-config --version
          
          echo "Testing phpize..."
          phpize --version || true
          
          echo "Testing phpdbg..."
          phpdbg --version 2>&1 || echo "phpdbg not available for this version"
          
          echo "Additional binaries test completed!"

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ matrix.php-version }}-build-logs
          path: |
            ~/.phpv/sources/
            ~/.phpv/versions/
          retention-days: 3

  test-summary:
    needs: test-php-versions
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Test Summary
        run: |
          echo "=========================================="
          echo "PHP Version Testing Summary"
          echo "=========================================="
          echo ""
          echo "Tested PHP versions:"
          echo "  - 4.4, 5.0, 5.1, 5.2, 5.3, 5.4, 5.5, 5.6"
          echo "  - 7.1, 7.2, 7.3, 7.4"
          echo "  - 8.0, 8.1, 8.2, 8.3, 8.4, 8.5"
          echo ""
          echo "Test scenario completed for each version:"
          echo "  1. Install - Download, build, and install PHP from source"
          echo "  2. Use & Shims - Generate shims with 'phpv use'"
          echo "  3. Run 'php -v' - Verified version output"
          echo "  4. Test binaries - Verify php-config, phpize, phpdbg"
          echo ""
          echo "Overall status: ${{ needs.test-php-versions.result }}"
          echo "=========================================="
