name: Test PHP Versions

on:
  push:
    branches: [development]
  pull_request:
    branches: [main, development]

jobs:
  test-php-install:
    timeout-minutes: 45
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php_version: ['7.4','8.2', '8.4', '8.5']

    # Setting the root at the job level or step level for isolation
    env:
      PHPV_ROOT: ${{ github.workspace }}/phpv-root-${{ matrix.php_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            sudo apt-get update && sudo apt-get install -y build-essential libssl-dev libxml2-dev libsqlite3-dev libtool
          else
            brew install openssl sqlite
          fi

      - name: Build phpv for Isolation
        run: |
          mkdir -p $PHPV_ROOT/bin
          go build -o $PHPV_ROOT/bin/phpv ./app/phpv.go
          # Add the version-specific bin to the path for all following steps
          echo "$PHPV_ROOT/bin" >> $GITHUB_PATH

      - name: Install PHP ${{ matrix.php_version }}
        # phpv uses the PHPV_ROOT env var to decide where to install
        run: phpv install ${{ matrix.php_version }}

      - name: Verify Isolated Installation
        run: |
          # 1. Initialize the shell for this specific PHPV_ROOT
          eval "$($PHPV_ROOT/bin/phpv init bash)"
          
          # 2. Switch to the version
          phpv use ${{ matrix.php_version }}
          
          # 3. Confirm binary location is inside our isolated root
          PHP_PATH=$(which php)
          echo "PHP Path: $PHP_PATH"
          
          if [[ "$PHP_PATH" != "$PHPV_ROOT"* ]]; then
            echo "Error: PHP is not running from the isolated root!"
            exit 1
          fi
          
          php -v
