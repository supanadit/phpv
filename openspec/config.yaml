schema: spec-driven

context: |
  # phpv — The PHP Version Manager That Actually Compiles

  A single-binary CLI tool (Go 1.25) that installs and manages multiple PHP versions
  (4.x-8.x) side-by-side on Linux and macOS. Resolves the full transitive C dependency
  graph (OpenSSL, libxml2, curl, zlib, oniguruma, ICU, etc.), detects system libraries
  via pkg-config, builds missing ones from source, then compiles PHP with correct
  --with-* flags. Also manages PECL extensions and PHAR tools (Composer, PIE, WP-CLI).

  ## Architecture: Clean Architecture (Go)

  Dependencies point inward. Layers from innermost to outermost:

  - domain/      — Pure data structs and sentinel errors. Zero framework imports.
  - {feature}/   — Use cases. Each declares its own repository interfaces.
  - internal/    — Delivery mechanisms, infrastructure repositories, and workers only.
  - app/         — Composition root. DI wiring via uber-go/fx.

  ## Modules

  ### Configuration
  Resolves PHPV_ROOT (env or ~/.phpv default). Provides directory path helpers for
  bin, versions, cache, sources, phar, and default-version file.

  ### Silo
  Manages the on-disk PHPV_ROOT layout: archives, extracted sources, installed
  PHP versions, per-version dependency trees, build tools, and install state
  tracking (in-progress, complete, failed).

  ### Bundler
  Top-level orchestrator for `phpv install`. Coordinates the full pipeline:
  resolve dependency graph → check system availability → download missing packages
  → extract archives → build from source → install. Also handles `phpv rebuild`
  (recompile PHP only, skipping dep downloads) and PECL extension lifecycle.

  ### Assembler
  Resolves transitive dependency graphs for a package at a given version. Performs
  topological sort into parallel build levels. Detects circular dependencies.
  Version-constraint-aware (different PHP versions may need different deps).

  ### Advisor
  Checks whether a dependency package is already available on the system (pkg-config,
  header detection) or must be built from source. Returns readiness state and
  suggested action.

  ### Forge
  Executes C/C++ builds using autotools (./configure && make), cmake, or make-only
  strategies. Accepts a ForgeConfig (prefix, flags, env, compiler paths) and returns
  the built result.

  ### Download
  Fetches source archives over HTTP. Supports fallback URLs, SHA256 checksum
  verification, and retry with configurable delay.

  ### Unload
  Extracts .tar.gz, .tar.xz, and .zip archives to destination directories.

  ### Extension
  Registry of bundled PHP extensions: --with-*/--enable-* flags, min/max PHP
  version ranges, conflicting extensions, implied extensions, and system library
  mappings with version constraints.

  ### Flag Resolver
  Maps PHP extensions to ./configure flags. Resolves C and C++ compiler standard
  flags per PHP version (e.g., -std=gnu11 for C, -std=gnu++17 for C++ when
  GCC 15+ requires C++14+ for ICU headers). Converts CFLAGS to CXXFLAGS,
  stripping C-only warning flags.

  ### Pattern
  Maps package name and version to download URLs. Supports OS/arch-aware matching,
  fallback URLs, template variables ({version}, {major}.{minor}), and extension
  functions for packages with non-standard archive naming.

  ### Source
  Registry of available packages and their versions. Resolves source vs. binary
  package types per target OS and architecture.

  ### Shim
  Generates dynamic shell shims (bash, zsh, fish) for php, phpize, php-config,
  php-cgi, composer, pie, and wp-cli. Shims resolve the active PHP version at
  runtime via PHPV_CURRENT → .phpvrc → composer.json → default → system fallback.

  ### Compiler Selection
  Determines which C compiler to use for a given PHP version. Core rules:
  PHP 5.x-7.x prefer gcc; PHP <5 and ≥8 prefer zig. Checks compiler availability
  and provides zig target triples for cross-compilation.

  ### Platform
  Detects the Linux distribution (from /etc/os-release) and package manager
  (apt, dnf, pacman, zypper, apk, xbps, brew). Maps tool names to distro-specific
  package names for install suggestions.

  ### Terminal (CLI Delivery)
  Cobra-based CLI commands: install, use, default, versions, rebuild, phar
  (install/update/list), pecl (install/list/uninstall), doctor, init, which,
  uninstall. Translates CLI input to use-case calls and formats output.

  ## Key Conventions

  - Interfaces belong to the CONSUMER. Use-case packages declare repository
    interfaces; infrastructure packages satisfy them implicitly.
  - Infrastructure packages NEVER import use-case packages.
  - fx providers return concrete types, never interfaces.
  - fx.In structs only in app/ or internal/, never in domain/ or use-case packages.
  - internal/ is exclusively for I/O: delivery, repository implementations, workers.
  - Sentinel errors defined in domain/errors.go.
  - Commits: conventional (feat:, fix:, refactor:), targeting the development branch.
  - Tests: table-driven with t.Run; afero for filesystem tests; hand-written mocks.

rules:
  proposal:
    - Keep proposals focused on one feature or change at a time
    - Must specify which modules are affected
    - Must include a "Non-goals" section
    - For PHP version or extension work, cite specific version ranges
    - Proposals under 500 words

  specs:
    - Each spec maps to one module
    - Domain types first, then service behavior, then repository interfaces
    - Repository interfaces declared in the consuming package, never in domain/
    - Include error scenarios and which sentinel error each returns
    - CLI-facing specs must define command signature, flags, and output format

  design:
    - Include layer diagram showing which modules and interfaces change
    - fx wiring changes must be documented: new providers, removed providers
    - Breaking changes to domain types require a migration plan
    - New dependencies between modules must respect the dependency rule

  tasks:
    - Break into small tasks (max 2 hours each)
    - Order respects the dependency rule: domain → use-case interfaces → infrastructure → delivery → wiring
    - Each task names the files it touches
    - Testing tasks separate from implementation, listed last
    - Final task: run `go build ./... && go test ./...`
